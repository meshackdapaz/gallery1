name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Next.js Export
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build Unsigned IPA
        run: |
          cd ios/App
          # Build the archive without signing
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean archive

          # Export the archive to an IPA
          # Since it's unsigned, we package the .app into a Payload folder and zip it
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -r MemorialGallery-Unsigned.ipa Payload
          cd ../..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemorialGallery-Unsigned
          path: ios/App/build/MemorialGallery-Unsigned.ipa
          retention-days: 7
